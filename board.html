<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Join | Board</title>
    <link
      rel="shortcut icon"
      href="./assets/img/logo-light.svg"
      type="image/x-icon"
    />
    <link rel="stylesheet" href="./style.css" />
    <link rel="stylesheet" href="./css/assets.css" />
    <link rel="stylesheet" href="./css/fonts.css" />
    <link rel="stylesheet" href="./css/standard.css" />

    <style>
      .board-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        width: 100vh;
        padding-inline: 80px;
      }
      .search-wrapper {
        display: flex;
        position: relative;
      }
      .search-icon {
        position: absolute;
        right: 200px;
        top: 50%;
        transform: translateY(-50%);
      }
      .find-task {
        align-items: center;
        border: 1px #dbdcde;
        border-style: solid;
        padding: 0px 14px;
        width: 260px;
        height: 40px;
        border-radius: 8px;
        margin-right: 34px;
        font-size: 18px;
      }

      .add-task {
        width: 160px;
        border-radius: 8px;
        font-size: 24px;
        font-weight: bold;
        color: white;
        background-color: var(--primary-color);
        border: none;
      }

      .add-task:hover {
        background-color: var(--highligted-color);
        box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.3);
        cursor: pointer;
      }

      .progress-board {
        gap: 60px;
        display: flex;
        align-items: center;
        margin-top: 80px;        
        padding-inline: 60px;
        justify-content: space-around;
      }

      .board-task {
        color: var(--primary-color);
        width: 300px;
        display: flex;
        align-content: center;
        align-items: center;
        justify-content: space-between;
      }

      .plus-btn {
        color: var(--primary-color);
        border-radius: 12px;
        border-color: var(--primary-color);
        border: 3px solid;
        width: 35px;
        height: 35px;
        font-size: 24px;
        font-weight: bold;
      }

      .plus-btn:hover {
        color: var(--highligted-color);
        cursor: pointer;
      }
      /* class for plus button (img) */
      /* .plus-btn {
        color: var(--primary-color);
        font-size: 24px;
        font-weight: bold;
        border: none;
      } */
    </style>
  </head>

  <body onload="loadSidebar('board')">
    <header class="topbar">
      <a>Kanban Project Management Tool</a>
      <button id="help">
        <a href="help.html"><img src="./assets/icons/help.svg" /></a>
      </button>
    </header>

    <aside id="sidebar"></aside>

    <main>
      <section class="board-bar">
        <h1>Board</h1>
        <div class="search-wrapper">
          <input class="find-task" type="text" placeholder="Find Task" />
          <span>
            <img src="./assets/icons/search.svg" class="search-icon"
          /></span>
          <button class="add-task">Add task +</button>
        </div>
      </section>
      <section class="progress-board">
        <div class="board-task">
          <h4>To do</h4>
          <button class="plus-btn">+</button>
        </div>
        <div class="board-task">
          <h4>In progress</h4>
          <button class="plus-btn">+</button>
        </div>
        <div class="board-task">
          <h4>Await feedback</h4>
          <button class="plus-btn">
            +
            <!-- <img src="./assets/icons/add-with-border-dark.svg" alt="" /> -->
          </button>
        </div>
        <div class="board-task">
          <h4>Done</h4>
        </div>
      </section>
    </main>

    <script src="./script.js"></script>
    <script src="./js/templates.js"></script>
  </body>
</html>
