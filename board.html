<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Join | Board</title>
    <link
      rel="shortcut icon"
      href="./assets/img/logo-light.png"
      type="image/x-icon"
    />
    <link rel="stylesheet" href="./style.css" />
    <link rel="stylesheet" href="./css/assets.css" />
    <link rel="stylesheet" href="./css/fonts.css" />
    <link rel="stylesheet" href="./css/standard.css" />

    <style>
      .board-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        width: 100vh;
        padding-inline: 80px;
      }
      .search-wrapper {
        display: flex;
        position: relative;
      }
      .search-icon {
        position: absolute;
        right: 200px;
        top: 50%;
        transform: translateY(-50%);
      }
      .find-task {
        align-items: center;
        border: 1px #dbdcde;
        border-style: solid;
        padding: 0px 14px;
        width: 260px;
        height: 40px;
        border-radius: 8px;
        margin-right: 34px;
        font-size: 18px;
      }

      .add-task {
        width: 160px;
        border-radius: 8px;
        font-size: 24px;
        font-weight: bold;
        color: white;
        background-color: var(--primary-color);
      }

      .progress-board {
        display: flex;
        align-items: center;
        margin-top: 80px;
        width: 100vh;
        padding-inline: 60px;
        justify-content: space-around;
      }

      .board-task {
        color: var(--primary-color);
        width: 250px;
        display: flex;
        align-content: center;
        align-items: center;
        justify-content: space-between;
      }

      .plus-btn {
        color: var(--primary-color);
        border-radius: 12px;
        border-color: var(--primary-color);
        border: 3px solid;
        width: 35px;
        height: 35px;
        font-size: 24px;
        font-weight: bold;
      }
    </style>
  </head>

  <body>
    <header class="topbar">
      <a>Kanban Project Management Tool</a>
      <img src="./assets/icons/help.png" />
    </header>

    <aside class="sidebar">
      <img src="./assets/img/logo-light.png" class="logo" />
      <nav>
        <a href="./summary.html"
          ><img src="./assets/icons/summary_icon.png" />Summary</a
        >

        <a href="./addtask.html"
          ><img src="./assets/icons/addtask_icon.png" />Add Task</a
        >

        <a class="active" href="./board.html"
          ><img src="./assets/icons/board_icon.png" />Board</a
        >

        <a href="./contacts.html"
          ><img src="./assets/icons/contacts_icon.png" />Contacts</a
        >
      </nav>

      <div class="privacy">
        <a href="">Privacy Policy</a>
        <a href="">Legal notice</a>
      </div>
    </aside>

    <main>
      <section class="board-bar">
        <h1>Board</h1>
        <div class="search-wrapper">
          <input class="find-task" type="text" placeholder="Find Task" />
          <span>
            <img src="./assets/icons/search.png" class="search-icon"
          /></span>
          <button class="add-task">Add task +</button>
        </div>
      </section>
      <section class="progress-board">
        <div class="board-task">
          <h4>To do</h4>
          <button class="plus-btn">+</button>
        </div>
        <div class="board-task">
          <h4>In progress</h4>
          <button class="plus-btn">+</button>
        </div>
        <div class="board-task">
          <h4>Await feedback</h4>
          <button class="plus-btn">+</button>
        </div>
        <div class="board-task">
          <h4>Done</h4>
        </div>
      </section>
    </main>
  </body>
</html>
