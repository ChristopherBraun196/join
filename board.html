<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Join | Board</title>
    <link
      rel="shortcut icon"
      href="./assets/img/logo-light.svg"
      type="image/x-icon"
    />
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="./css/assets.css">
    <link rel="stylesheet" href="./css/fonts.css">
    <link rel="stylesheet" href="./css/standard.css">
    <link rel="stylesheet" href="./css/addTask.css">
    <link rel="stylesheet" href="./css/board.css" />
 <style>
      .drag-area {
        height: 200px;
        background-color: rgba(0, 0, 0, 0.1);
        border: 1px dashed black;
        margin-bottom: 50px;
        display: flex;
        align-items: flex-start;
      }

      .drag-area-highlight {
        background-color: rgba(0, 0, 0, 0.2);
      }

      .todo {
        background-color: white;
        border: 1px solid black;
        border-radius: 5px;
        padding: 10px;
        margin: 10px;
      }

      .task-card {
        background: #fff;
        border-radius: 16px;
        padding: 20px;
        width: 240px;
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);        
        transition: box-shadow 0.2s;
        margin-top: 14px;
      }

      .task-card:hover {
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.14);
      }

      .category-badge {
        display: inline-block;       
        background-color: #1FD7C1;  /* color Technical Task */
        background-color: #0038FF;  /* color User Story */
        color: #fff;
        font-size: 13px;
        font-weight: 600;
        width: 160px;
        border-radius: var(--border-radius);
        padding: 4px 12px;
        margin-bottom: 14px;
      }

      .task-title {
        font-weight: 700;
        font-size: 16px;
        color: #1a1a2e;
        margin: 0 0 6px 0;
        line-height: 1.3;
      }

      .task-description {
        font-size: 13px;
        color: #aaa;
        margin: 0 0 16px 0;
        line-height: 1.5;
      }

      .progress-wrapper {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 16px;
      }

      .progress-bar {
        flex: 1;
        height: 8px;
        background: #e0e7ff;
        border-radius: 99px;
        overflow: hidden;
      }

      .progress-fill {
        height: 100%;
        background: #0038ff;
        border-radius: 99px;
      }

      .task-footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .avatars {
        display: flex;
      }

      .avatar {
        width: 34px;
        height: 34px;
        border-radius: 50%;
        color: #fff;
        font-size: 12px;
        font-weight: 700;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-left: -8px;
        border: 2px solid #fff;
      }

      .avatars .avatar:first-child {
        margin-left: 0;
      }

      .menu-icon {
        display: flex;
        flex-direction: column;
        gap: 4px;
        cursor: pointer;
      }

      .menu-icon span {
        display: block;
        width: 18px;
        height: 2px;
        background: #ffb347;
        border-radius: 2px;
      }
    </style>

  </head>

  <body onload="initBoard('board');">

    <aside id="sidebar"></aside>

    <main>
      <section class="board-bar">
        <h1>Board</h1>
        <div class="search-wrapper">
          <input
            class="find-task"
            type="text"
            role="search"
            placeholder="Find Task                                           |"
          />
          <span>
            <img src="./assets/icons/search.svg" class="search-icon" />
          </span>
           <button class="primary-btn add-task">Add task +</button>
        </div>
      </section>

      <section class="progress-board">
        <div class="board-task">
          <div class="board-task-header">
            <h4>To do</h4>
            <button class="plus-btn" onclick="openAddTaskDialog()">+</button>
          </div>
          <div
            class="task-content"
            id="toDo"
            ondrop="moveTo('todo')"
            ondragleave="removeHighlight('toDo')"
            ondragover="
              allowDrop(event);
              highlight('toDo');
            "
          ></div>
        </div>

        <div class="board-task">
          <div class="board-task-header">
            <h4>In progress</h4>
            <button class="plus-btn">+</button>
          </div>
          <div
            class="task-content"
            id="inProgress"
            ondrop="moveTo('inProgress')"
            ondragleave="removeHighlight('inProgress')"
            ondragover="
              allowDrop(event);
              highlight('inProgress');
            "
          ></div>
        </div>

        <div class="board-task">
          <div class="board-task-header">
            <h4>Await feedback</h4>
            <button class="plus-btn">+</button>
          </div>
          <div
            class="task-content"
            id="await"
            ondrop="moveTo('await')"
            ondragleave="removeHighlight('await')"
            ondragover="
              allowDrop(event);
              highlight('await');
            "
          ></div>
        </div>

        <div class="board-task">
          <div class="board-task-header">
            <h4>Done</h4>
          </div>
          <div
            class="task-content"
            id="done"
            ondrop="moveTo('done')"
            ondragleave="removeHighlight('done')"
            ondragover="
              allowDrop(event);
              highlight('done');
            "
          ></div>
        </div>
      </section>
    </main>
    <script src="./script.js"></script>
    <script src="./js/database.js"></script>
    <script src="./js/validation.js"></script>
    <script src="./js/templates.js"></script>
    <script src="./js/addTask.js"></script>
    <script src="./js/board.js"></script>
  </body>
</html>
