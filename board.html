<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Join | Board</title>
    <link
      rel="shortcut icon"
      href="./assets/img/logo-light.svg"
      type="image/x-icon"
    />
    <link rel="stylesheet" href="./style.css" />
    <link rel="stylesheet" href="./css/assets.css" />
    <link rel="stylesheet" href="./css/fonts.css" />
    <link rel="stylesheet" href="./css/standard.css" />
    <link rel="stylesheet" href="./css/board.css" />
    <link rel="stylesheet" href="./css/addTask.css">

    <style>
      .drag-area {
        height: 200px;
        background-color: rgba(0, 0, 0, 0.1);
        border: 1px dashed black;
        margin-bottom: 50px;
        display: flex;
        align-items: flex-start;
      }

      .drag-area-highlight {
        background-color: rgba(0, 0, 0, 0.2);
      }

      .todo {
        background-color: white;
        border: 1px solid black;
        border-radius: 5px;
        padding: 10px;
        margin: 10px;
      }
    </style>
  </head>

  <body
    onload="
      loadSidebar('board');
      updateHTML();
    "
  >
    <header class="topbar">
      <a>Kanban Project Management Tool</a>
      <button id="help">
        <a href="help.html"><img src="./assets/icons/help.svg" /></a>
      </button>
    </header>

    <aside id="sidebar"></aside>

    <main>
      <section class="board-bar">
        <h1>Board</h1>
        <div class="search-wrapper">
          <input class="find-task" type="text" placeholder="Find Task" />
          <span>
            <img src="./assets/icons/search.svg" class="search-icon"
          /></span>
          <button class="add-task">Add task +</button>
        </div>
      </section>
      <section class="progress-board">
        <div class="board-task">
          <h4>To do</h4>
          <button class="plus-btn" onclick="openAddTaskDialog()">+</button>
          <div
            class="task-content"
            id="toDo"
            ondrop="moveTo('toDo')"
            ondragleave="removeHighlight('toDo')"
            ondragover="
              allowDrop(event);
              highlight('toDo');
            "
          ></div>
        </div>
        <div class="board-task">
          <h4>In progress</h4>
          <button class="plus-btn">+</button>
          <div
            class="task-content"
            id="inProgress"
            ondrop="moveTo('inProgress')"
            ondragleave="removeHighlight('inProgress')"
            ondragover="
              allowDrop(event);
              highlight('inProgress');
            "
          ></div>
        </div>
        <div class="board-task">
          <h4>Await feedback</h4>
          <button class="plus-btn">+</button>
          <div
            class="task-content"
            id="await"
            ondrop="moveTo('await')"
            ondragleave="removeHighlight('await')"
            ondragover="
              allowDrop(event);
              highlight('await');
            "
          ></div>
        </div>
        <div class="board-task">
          <h4>Done</h4>
          <div
            class="task-content"
            id="done"
            ondrop="moveTo('done')"
            ondragleave="removeHighlight('done')"
            ondragover="
              allowDrop(event);
              highlight('done');
            "
          ></div>
        </div>
      </section>
    </main>
    <script src="./script.js"></script>
    <script src="./js/board.js"></script>
    <script src="./js/templates.js"></script>
  </body>
</html>
