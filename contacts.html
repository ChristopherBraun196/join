<!doctype html>
<html lang="de">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Document</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="./css/assets.css" />
  <link rel="stylesheet" href="./css/fonts.css" />
  <link rel="stylesheet" href="./css/standard.css" />
  <link rel="stylesheet" href="./css/dialog_contact.css" />
</head>

<body onload="init('contact');">

  <aside id="sidebar"></aside>
  <aside id="sidebar_contacts">
    <button class="primary-btn add_contact" onclick="openContactDialog()">Add new contact <img
        src="./assets/icons/person_add.svg"></button>
  </aside>

  <main class="main_contacts">
    <div class="headline">
      <h1>Contacts</h1>
      <div class="line"></div><a>Better with a team</a>
    </div>
  </main>


  <div id="dialog-overlay" class="dialog-overlay">
    <div class="dialog-box">

      <!-- Links -->
      <div class="dialog-left">
        <img src="./assets/img/logo-light.png" class="dialog-logo">
        <h1>Add contact</h1>
        <p>Tasks are better with a team!</p>
        <div class="logo-underline"></div>
      </div>

      <!-- Rechts -->
      <div class="dialog-right">
        <button class="close-btn" onclick="closeContactDialog()">&#x2715;</button>

        <div class="dialog-content">
          <img src="./assets/icons/contact_pb.svg" class="avatar">

          <div class="dialog-fields">
            <div class="field-wrap">
              <input id="input-name" type="text" placeholder="Name" required>
              <svg class="field-icon" viewBox="0 0 24 24" fill="currentColor">
                <path
                  d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v1.2h19.2v-1.2c0-3.2-6.4-4.8-9.6-4.8z" />
              </svg>
            </div>
            <div class="field-wrap">
              <input id="input-email" type="email" placeholder="Email" required>
              <svg class="field-icon" viewBox="0 0 24 24" fill="currentColor">
                <path
                  d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4-8 5-8-5V6l8 5 8-5v2z" />
              </svg>
            </div>
            <div class="field-wrap">
              <input id="input-phone" type="tel" placeholder="Phone" required>
              <svg class="field-icon" viewBox="0 0 24 24" fill="currentColor">
                <path
                  d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1-9.4 0-17-7.6-17-17 0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1L6.6 10.8z" />
              </svg>
            </div>


            <div class="dialog-actions">
              <button class="btn-cancel" onclick="closeContactDialog()">Cancel &#x2715;</button>
              <button class="btn-submit" onclick="submitContact()">Create contact &#x2713;</button>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>


  <script src="./js/dialog_contact.js"></script>
  <script src="./script.js"></script>
  <script src="./js/templates.js"></script>
</body>

</html>
